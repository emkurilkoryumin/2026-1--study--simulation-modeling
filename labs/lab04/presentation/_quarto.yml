project:
  title: "presentation"
  output-dir: "_output"

standalone: true
self-contained: true
slide-level: 2
crossref:
  lof-title: Список иллюстраций
  lot-title: Список таблиц
  lol-title: Листинги
format: # Formats
  beamer: # Pdf output format
    toc: true
    toc-title: Содержание
    number-sections: false
    number-depth: 1
    colorlinks: false
    toc-depth: 1
    aspectratio: 169
    section-titles: false
    incremental: false
    navigation: horizontal
    csquotes: true
    indent: true
    include-in-header:
      - file: _resources/tex/beamer.tex
  revealjs: # Html output
    transition: fade
    margin: 0.2
    smaller: true
    slide-number: true
    output-ext: html
    theme: white
    logo: _resources/image/logo_rudn.png
